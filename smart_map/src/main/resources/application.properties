################################################################################

spring.application.name=smart_map
server.port=8080

################################################################################
# DATABASE - Microsoft SQL Server (local)
################################################################################
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=smart_map;encrypt=true;trustServerCertificate=true;loginTimeout=30;sendStringParametersAsUnicode=true;selectMethod=cursor;responseBuffering=adaptive
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

################################################################################
# JPA / Hibernate
################################################################################
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.open-in-view=false

################################################################################
# FLYWAY - Database Migration
################################################################################
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true

################################################################################
# FILE UPLOAD (cho Module Map - upload floorplan)
################################################################################
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB
app.upload.dir=./uploads/maps

################################################################################
# CORS
################################################################################
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

################################################################################
# LOGGING
################################################################################
logging.level.com.fpt.edu.vn.smart_map=DEBUG
logging.level.org.hibernate.SQL=DEBUG
